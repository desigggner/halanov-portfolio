<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Все кейсы продуктового дизайнера Влада Галанова на отдельной странице портфолио."
    />
    <title>Портфолио | Halanov</title>
    <script>
      (function () {
        var storedTheme = localStorage.getItem("portfolio-theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = storedTheme || (prefersDark ? "dark" : "light");
        if (!window.location.hash && "scrollRestoration" in window.history) {
          window.history.scrollRestoration = "manual";
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Borel&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>

      <main class="main-content portfolio-main">
        <section class="portfolio-hero container" aria-labelledby="portfolio-title">
          <h1 class="portfolio-hero__title" id="portfolio-title">
            <span class="portfolio-hero__row">
              <span data-portfolio-total-text>0 проектов за</span>
              <span class="portfolio-stat-pill" data-portfolio-years-text>12 лет,</span>
            </span>
            <span class="portfolio-hero__row">
              <span class="portfolio-stat-pill" data-portfolio-active-text>0 — в работе</span>
              <span class="portfolio-hero__tail">прямо сейчас</span>
            </span>
          </h1>
        </section>

        <section class="portfolio-toolbar container" aria-label="Фильтры портфолио">
          <div class="portfolio-filters" data-portfolio-filters></div>

          <div class="portfolio-layout" aria-label="Режим отображения кейсов">
            <button
              class="portfolio-layout__button is-active"
              type="button"
              data-portfolio-layout-button="grid"
              aria-label="Показать кейсы сеткой"
              aria-pressed="true"
            >
              <svg viewBox="0 0 16 16" focusable="false" fill="none">
                <rect x="1.5" y="1.5" width="4.5" height="4.5" rx="1.2" stroke="currentColor" />
                <rect x="10" y="1.5" width="4.5" height="4.5" rx="1.2" stroke="currentColor" />
                <rect x="1.5" y="10" width="4.5" height="4.5" rx="1.2" stroke="currentColor" />
                <rect x="10" y="10" width="4.5" height="4.5" rx="1.2" stroke="currentColor" />
              </svg>
            </button>
            <button
              class="portfolio-layout__button"
              type="button"
              data-portfolio-layout-button="list"
              aria-label="Показать кейсы списком"
              aria-pressed="false"
            >
              <svg viewBox="0 0 16 16" focusable="false" fill="none">
                <path d="M3 4H13" stroke="currentColor" stroke-linecap="round" />
                <path d="M3 8H13" stroke="currentColor" stroke-linecap="round" />
                <path d="M3 12H13" stroke="currentColor" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </section>

        <section
          class="cases container portfolio-gallery"
          aria-labelledby="portfolio-gallery-title"
          data-portfolio-grid
        >
          <h2 class="sr-only" id="portfolio-gallery-title">Все кейсы</h2>

          <div class="cases__column" data-portfolio-column="left"></div>
          <div class="cases__column cases__column--right" data-portfolio-column="right"></div>
        </section>

        <section class="portfolio-list container" data-portfolio-list hidden>
          <h2 class="sr-only">Все кейсы списком</h2>

          <div class="portfolio-list__header" aria-hidden="true">
            <span>Год</span>
            <span>Категория</span>
            <span>Кейс</span>
            <span>Статус</span>
          </div>

          <div class="portfolio-list__body" data-portfolio-list-body></div>
        </section>

        <p class="portfolio-empty container" data-portfolio-empty hidden>
          В этой категории пока нет кейсов.
        </p>

      </main>

</html>
