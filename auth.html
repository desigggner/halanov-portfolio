<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Вход | Halanov</title>
    <script src="./site-theme-init.js"></script>
    <style>
      :root {
        --bg: #f4f1ee;
        --surface: rgba(255, 255, 255, 0.84);
        --surface-border: rgba(51, 48, 55, 0.08);
        --text: #333037;
        --muted: rgba(51, 48, 55, 0.66);
        --button-bg: #333037;
        --button-text: #ffffff;
        --focus: rgba(52, 107, 255, 0.42);
      }

      html[data-theme="dark"] {
        --bg: #1f1f1f;
        --surface: rgba(44, 44, 44, 0.92);
        --surface-border: rgba(255, 255, 255, 0.08);
        --text: #f5efe8;
        --muted: rgba(245, 239, 232, 0.62);
        --button-bg: #f4efe8;
        --button-text: #1f1a21;
        --focus: rgba(138, 174, 255, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Google Sans", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.14), transparent 32%),
          radial-gradient(circle at bottom right, rgba(74, 114, 255, 0.12), transparent 28%),
          var(--bg);
      }

      .site-auth {
        display: grid;
        min-height: 100vh;
        padding: 24px;
      }

      .site-auth__card {
        width: min(560px, 100%);
        margin: auto;
        padding: 32px;
        border: 1px solid var(--surface-border);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(20px);
      }

      .site-auth__eyebrow,
      .site-auth__message {
        margin: 0;
      }

      .site-auth__eyebrow {
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .site-auth__title {
        margin: 12px 0 0;
        font-size: clamp(2.8rem, 8vw, 4.3rem);
        font-weight: 400;
        line-height: 0.96;
        letter-spacing: -0.06em;
      }

      .site-auth__note {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      .site-auth__form {
        display: grid;
        gap: 14px;
        margin-top: 26px;
      }

      .site-auth__field {
        display: grid;
        gap: 8px;
      }

      .site-auth__label {
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.2;
      }

      .site-auth__input {
        width: 100%;
        min-height: 52px;
        padding: 14px 16px;
        border: 1px solid var(--surface-border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font: inherit;
      }

      .site-auth__input:focus-visible,
      .site-auth__button:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 3px;
      }

      .site-auth__actions {
        display: flex;
        gap: 12px;
        margin-top: 6px;
      }

      .site-auth__button {
        border: 0;
        border-radius: 999px;
        min-height: 48px;
        padding: 12px 22px;
        background: var(--button-bg);
        color: var(--button-text);
        font: inherit;
        cursor: pointer;
      }

      .site-auth__button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .site-auth__message {
        min-height: 24px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.45;
      }

      .site-auth__message.is-error {
        color: #c44d4d;
      }

      @media (max-width: 640px) {
        .site-auth {
          padding: 16px;
        }

        .site-auth__card {
          padding: 24px 20px;
          border-radius: 24px;
        }

        .site-auth__actions {
          display: block;
        }

        .site-auth__button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="site-auth">
      <section class="site-auth__card" aria-labelledby="site-auth-title">
        <p class="site-auth__eyebrow">Приватный доступ</p>
        <h1 class="site-auth__title" id="site-auth-title">Вход на сайт</h1>
        <p class="site-auth__note">
          Доступ временно закрыт логином и паролем. После входа сессия сохранится на 30 дней.
        </p>

        <form class="site-auth__form" data-site-auth-form>
          <label class="site-auth__field">
            <span class="site-auth__label">Логин</span>
            <input
              class="site-auth__input"
              type="text"
              name="login"
              autocomplete="username"
              placeholder="Введите логин"
              required
            />
          </label>

          <label class="site-auth__field">
            <span class="site-auth__label">Пароль</span>
            <input
              class="site-auth__input"
              type="password"
              name="password"
              autocomplete="current-password"
              placeholder="Введите пароль"
              required
            />
          </label>

          <div class="site-auth__actions">
            <button class="site-auth__button" type="submit" data-site-auth-submit>Войти</button>
          </div>
        </form>

        <p class="site-auth__message" data-site-auth-message aria-live="polite"></p>
      </section>
    </main>

    <script src="./site-auth.js" defer></script>
  </body>
</html>
